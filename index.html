<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Effect</title>
    <link rel="stylesheet" href="style.css">
    <meta http-equiv=“X-UA-Compatible” content=“ie=edge”>
</head>
<body>
    <header class="parallax">
        <h1>Welcome to the Parallax Effect</h1>
    </header>
    <main>
        <section>
            <h2>Section Title</h2>
            <p>Content goes here. Scroll down to see the parallax effect.</p>
        </section>
        <section>
            <h2>Another Section</h2>
            <p>More content to scroll through. The parallax background will stay in place.</p>
        </section>
    </main>
</body>
</html>
